[build-system]
requires = ["setuptools>=72", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "documind-core"
version = "0.1.0"
description = "Shared core library for the Documind monorepo"
requires-python = ">=3.11"
dependencies = [
    # ─── Settings & Validation ────────────────────────────
    "pydantic>=2.7",
    "pydantic-settings>=2.3",

    # ─── Database ORM ─────────────────────────────────────
    "sqlmodel>=0.0.19",

    # ─── Vector Store ─────────────────────────────────────
    "qdrant-client>=1.9",

    # ─── LLM / Orchestration ──────────────────────────────
    "langchain-core>=1.2",
    "langchain>=1.0",
    "langgraph>=1.0",
    "langchain-community>=0.4",
    "ollama>=0.6",

    # ─── Embeddings & Reranking ───────────────────────────
    "sentence-transformers>=3.0",
    "FlagEmbedding>=1.2",
    "rank-bm25>=0.2",

    # ─── Document Parsing ─────────────────────────────────
    "pymupdf>=1.24",
    "python-docx>=1.1",
    "beautifulsoup4>=4.12",
    "markdown>=3.6",

    # ─── Observability ────────────────────────────────────
    "langfuse>=3",
    "tiktoken>=0.7"
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["documind_core*"]
